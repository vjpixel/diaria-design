<!-- @dsCard group="Colors" viewport="700x190" name="Marca · teal" subtitle="O único acento — ponto, .br, links e kickers" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 24px; display: grid; grid-template-columns: 1fr; gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--rule); display: grid; grid-template-columns: 160px 1fr; }
  .chip { height: 96px; }
  .lbl { padding: 16px 18px; background: var(--surface-card); display: flex; flex-direction: column; justify-content: center; }
  .name { font-size: 14px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink); opacity: 0.55; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 3px; }
  .use { font-size: 12px; color: var(--ink); opacity: 0.7; margin-top: 8px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--brand)"></div><div class="lbl"><div class="name">Teal</div><div class="hex">#00A0A0</div><div class="use">Único acento da marca — o ponto e o <b>.br</b> da wordmark, links, kickers e marcações. Usado com parcimônia sobre papel ou ink.</div></div></div>
  </div>
</body>
</html>
