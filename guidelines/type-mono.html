<!-- @dsCard group="Type" viewport="700x200" name="Mono · kickers & labels" subtitle="Geist Mono em maiúsculas, tracking largo — meta e rótulos" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
  .kicker { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--ink-soft); }
  .kicker.accent { color: var(--brand-deep); }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); letter-spacing: 0.08em; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="kicker accent">● EDIÇÃO DE HOJE</div>
    <div class="kicker">SEU FILTRO NO CAOS · DIÁRIO · SÃO PAULO</div>
    <div class="meta">EDIÇÃO Nº 412 · TER 19 MAI 2026 · 5 MIN</div>
    <div class="tag">Geist Mono · 10–11px · tracking 0.08–0.16em · sempre UPPERCASE</div>
  </div>
</body>
</html>
