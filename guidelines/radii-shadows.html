<!-- @dsCard group="Spacing" viewport="700x200" name="Raios, filetes & sombra" subtitle="Sistema plano: filetes em vez de sombra, controles em pílula" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 24px 32px; display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 78px; height: 58px; background: var(--surface-card); border: 1px solid var(--rule); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.04em; text-align: center; }
  .pill { width: 96px; height: 38px; border-radius: 999px; background: var(--ink); }
  .rule2 { width: 78px; height: 2px; background: var(--ink); }
  .rule1 { width: 78px; height: 1px; background: var(--rule); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="n">sm · 4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="n">md · 6px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="n">lg · 12px</div></div>
    <div class="item"><div class="pill"></div><div class="n">pill · 999</div></div>
    <div class="item"><div class="box" style="border:none; box-shadow:var(--shadow-pop); background:var(--surface-card)"></div><div class="n">shadow-pop</div></div>
    <div class="item"><div style="display:flex;flex-direction:column;gap:10px"><div class="rule2"></div><div class="rule1"></div></div><div class="n">rule 2 / 1px</div></div>
  </div>
</body>
</html>
