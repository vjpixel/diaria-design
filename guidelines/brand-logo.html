<!-- @dsCard group="Brand" viewport="700x260" name="Wordmark Diar.ia" subtitle="Geist 600 · pontos e .br sempre em teal" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { border: 1px solid var(--rule); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; min-height: 96px; padding: 24px; }
  .panel.dark { background: var(--ink); }
  .panel.cream { background: var(--paper); }
  .panel.white { background: #fff; }
  .panel img { height: 30px; width: auto; display: block; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; grid-column: 1 / -1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel white"><img src="../assets/logo/png/logo-2048.png" alt="Diar.ia" /></div>
    <div class="panel dark"><img src="../assets/logo/png/logo-dark-2048.png" alt="Diar.ia" /></div>
    <div class="cap">Primária sobre claro · Invertida sobre ink · Área de respiro ≥ altura do "d" · Mínimo 16px</div>
  </div>
</body>
</html>
