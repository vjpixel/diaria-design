<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 28px 32px; display: flex; flex-direction: column; gap: 22px; }
  .group { display: flex; flex-direction: column; gap: 10px; }
  .glabel { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .dark { background: var(--ink); border-radius: var(--radius-md); padding: 16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react">
    // Find the generated DS namespace (the global object exporting Button).
    const NS = Object.values(window).find(v => v && typeof v === 'object' && v.Button && v.Kicker) || window;
    const { Button, Kicker, Badge, Rule, EmailSignup, Logo } = NS;

    function Demo() {
      return (
        <div className="wrap">
          <div className="group">
            <div className="glabel">Buttons</div>
            <div className="row">
              <Button variant="ink">Assinar grátis</Button>
              <Button variant="outline">Entrar</Button>
              <Button variant="ghost">Buscar</Button>
              <Button variant="ink" size="sm">Pequeno</Button>
            </div>
            <div className="row dark">
              <Button variant="teal" onDark>Ver os 28 cursos →</Button>
              <Button variant="outline" onDark>Saiba mais</Button>
              <Button variant="ghost" onDark>Buscar</Button>
            </div>
          </div>
          <div className="group">
            <div className="glabel">Kicker · Badge · Logo</div>
            <div className="row">
              <Kicker accent>● Edição de hoje</Kicker>
              <Kicker>Nº 412 · 5 min</Kicker>
              <Badge variant="tint">iniciante · 14</Badge>
              <Badge variant="outline">avançado · 10</Badge>
              <Badge variant="solid">Nº 412</Badge>
              <Logo size={20} />
            </div>
          </div>
          <div className="group">
            <div className="glabel">EmailSignup</div>
            <div className="row" style={{ maxWidth: 440 }}>
              <EmailSignup style={{ flex: 1 }} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
