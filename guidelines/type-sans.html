<!-- @dsCard group="Type" viewport="700x210" name="Sans · Geist" subtitle="Corpo de texto, navegação e UI — também é a wordmark" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 28px 32px; max-width: 640px; }
  .lead { font-size: 22px; line-height: 1.4; color: var(--ink); margin: 0 0 14px; }
  .body { font-size: 16px; line-height: var(--leading-relaxed); color: var(--ink-soft); margin: 0 0 16px; }
  .row { display: flex; gap: 22px; align-items: baseline; }
  .row span { font-weight: var(--w); }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 16px; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lead">Um resumo diário das principais pesquisas, notícias e tendências de IA.</p>
    <p class="body">Para ler em 5 minutos, se manter atualizado e usar IA melhor. O corpo de texto usa Geist em 15px com entrelinha generosa de 1,55.</p>
    <div class="row">
      <span style="font-weight:300">Light 300</span>
      <span style="font-weight:400">Regular 400</span>
      <span style="font-weight:500">Medium 500</span>
      <span style="font-weight:600">Semibold 600</span>
      <span style="font-weight:700">Bold 700</span>
    </div>
    <div class="tag">Geist · 300–700 · fallback: system-ui</div>
  </div>
</body>
</html>
