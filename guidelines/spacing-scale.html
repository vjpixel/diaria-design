<!-- @dsCard group="Spacing" viewport="700x170" name="Escala de espaçamento" subtitle="Base 4px — gutters de 56px, ritmo de seção de 88px" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 26px 32px; display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .bar { background: var(--brand); border-radius: 2px; height: 16px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="bar" style="width:4px"></div><div class="n">1 · 4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="n">2 · 8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="n">3 · 12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="n">4 · 16</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="n">5 · 24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="n">6 · 32</div></div>
    <div class="item"><div class="bar" style="width:44px"></div><div class="n">7 · 44</div></div>
    <div class="item"><div class="bar" style="width:56px"></div><div class="n">8 · 56</div></div>
    <div class="item"><div class="bar" style="width:72px"></div><div class="n">9 · 72</div></div>
    <div class="item"><div class="bar" style="width:88px"></div><div class="n">10 · 88</div></div>
  </div>
</body>
</html>
