<!-- @dsCard group="Colors" viewport="700x190" name="Superfícies · papel & bege" subtitle="Quase-branco quente + o bege que preenche e desenha fios" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-sans); color: var(--ink); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--rule); }
  .chip { height: 84px; }
  .lbl { padding: 10px 12px; background: var(--surface-card); }
  .name { font-size: 13px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink); opacity: 0.55; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }
  .use { font-size: 11px; color: var(--ink); opacity: 0.7; margin-top: 6px; line-height: 1.3; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="lbl"><div class="name">Papel</div><div class="hex">#FBFAF6</div><div class="use">Fundo principal — quase branco, leve calor</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-alt)"></div><div class="lbl"><div class="name">Bege</div><div class="hex">#EBE5D0</div><div class="use">Moldura, seções recuadas, boxes cheios e todos os fios</div></div></div>
  </div>
</body>
</html>
